<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TENNIS ĐỊNH MỆNH CD9 2026</title>
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #ffff00;
            --dark: #121212;
            --bg: #f4f4f4;
            --win: #2e7d32;
            --lose: #d32f2f;
            --draw: #757575;
            --gold: #FFD700;
            --win-bg: #c8e6c9;
            --lose-bg: #ffcdd2;
            --warn-bg: #fff9c4;
        }

        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
        header { background: var(--dark); color: var(--accent); text-align: center; padding: 15px 0; font-size: 20px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid var(--primary); position: sticky; top: 0; z-index: 2000; }
        
        .section-title { background: var(--primary); color: white; padding: 10px; margin-top: 15px; font-weight: bold; text-transform: uppercase; text-align: center; font-size: 14px; position: sticky; top: 54px; z-index: 1000; }
        .container { padding: 5px; max-width: 100%; box-sizing: border-box; }

        .table-wrapper { background: white; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* BXH - CẬP NHẬT CĂN GIỮA VÀ SIZE TIÊU ĐỀ */
        .bxh-table th { background: #263238; color: white; font-size: 14px; padding: 12px 2px; text-align: center; font-weight: bold; }
        .bxh-table td { padding: 12px 2px; font-size: 12px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        .bxh-table tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Cột STT */
        .bxh-table td:nth-child(1) { font-weight: bold; color: #666; width: 35px; }
        
        /* Cột Tên đội - Giữ căn trái để dễ đọc, hoặc đổi sang center nếu muốn */
        .bxh-table td:nth-child(2) { text-align: left; padding-left: 10px; font-weight: 800; color: #1a237e; font-size: 13px; }
        
        /* Cột Điểm (Pts) */
        .bxh-table td:last-child { background: #fff9c4; font-weight: 900; color: #000; font-size: 14px; border-left: 1px solid #ddd; text-align: center; }
        .bxh-table th:last-child { background: #fbc02d; color: #000; text-align: center; }
        
        .top-1 { background-color: #fffde7 !important; }

        /* Style cho các bảng phụ */
        .standard-table th, .standard-table td { border: 1px solid #ccc; padding: 6px 2px; text-align: center; font-size: 11px; }

        .cell-full { background-color: var(--win-bg) !important; color: var(--win) !important; font-weight: bold; font-size: 10px !important; }
        .cell-none { background-color: var(--lose-bg) !important; color: var(--lose) !important; font-weight: bold; font-size: 10px !important; }
        .cell-missing { background-color: var(--warn-bg) !important; color: #a57d00 !important; font-weight: bold; font-size: 10px !important; }
        .cell-empty { background-color: #f0f0f0; }

        /* Card Lịch thi đấu và Hiệu ứng */
        .card-list { display: flex; flex-direction: column; gap: 8px; padding: 5px 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .match-card {
            background: white; border-radius: 10px; padding: 12px 10px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #ddd;
            animation: fadeInUp 0.4s ease forwards;
        }
        .match-date { font-size: 10px; color: #888; margin-bottom: 6px; font-weight: bold; }
        .match-main { display: flex; align-items: center; justify-content: center; width: 100%; gap: 5px; }
        .team-box { flex: 1; text-align: center; font-weight: 900; font-size: 17px; color: #1a237e; line-height: 1.1; }
        .txt-win { color: var(--win) !important; }
        .txt-lose { color: var(--lose) !important; }
        .score-display { display: flex; align-items: center; gap: 4px; }
        .score-box { background: #000; color: var(--accent); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 20px; font-weight: 900; }
        .result-badge { margin-top: 8px; padding: 4px 14px; border-radius: 12px; color: white; font-weight: 800; font-size: 10px; text-transform: uppercase; }
        .win-badge { background: var(--win); } .lose-badge { background: var(--lose); } .draw-badge { background: var(--draw); }

        .filter-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 12px; background: white; border-bottom: 1px solid #ddd; }
        .filter-btn { padding: 8px 16px; border: 1.5px solid var(--primary); background: white; color: var(--primary); font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .filter-btn.active { background: var(--primary); color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<header>TENNIS ĐỊNH MỆNH CD9 2026</header>

<div class="container">
    <section><div class="section-title">🏆 Bảng Xếp Hạng</div><div id="BXH" class="table-wrapper"></div></section>
    <section><div class="section-title">🎾 Lịch Thi Đấu & Kết Quả</div><div id="MATCHES" class="card-list"></div></section>
    <section><div class="section-title">🤝 Danh Sách Cặp Đấu</div><div id="PAIRS" class="table-wrapper"></div></section>
    <section><div class="section-title">👥 Danh Sách Teams</div><div id="TEAMS" class="table-wrapper"></div></section>
    <section>
        <div class="section-title">✅ Kiểm Tra Kết Quả</div>
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterMatches('ALL', this)">Tất cả</button>
            <button class="filter-btn" onclick="filterMatches('D1', this)">D1</button>
            <button class="filter-btn" onclick="filterMatches('D2', this)">D2</button>
            <button class="filter-btn" onclick="filterMatches('D3', this)">D3</button>
            <button class="filter-btn" onclick="filterMatches('D4', this)">D4</button>
            <button class="filter-btn" onclick="filterMatches('D5', this)">D5</button>
        </div>
        <div id="CHECK_RESULT" class="card-list"></div>
    </section>
</div>

<script>
const SHEET_ID = "1pak2Yy4rZ3U50rYj2rlfCOkqyDDpnOns";
let allMatches = [];

async function loadSheet(sheetName, targetId) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    try {
        const r = await fetch(url);
        const txt = await r.text();
        const json = JSON.parse(txt.substring(47).slice(0, -2));
        const rows = json.table.rows;

        if (sheetName === "MATCHES") {
            allMatches = rows.filter(row => row.c && row.c[0] && row.c[0].v !== null);
            allMatches.sort((a, b) => {
                const getSortValue = (row) => {
                    const d = String(row.c[0]?.v || "0").padStart(2, '0');
                    const m = String(row.c[1]?.v || "0").padStart(2, '0');
                    const y = String(row.c[2]?.v || "2026");
                    return parseInt(y + m + d);
                };
                return getSortValue(b) - getSortValue(a);
            });
            renderCards(allMatches, "MATCHES", "ALL");
            renderCards(allMatches, "CHECK_RESULT", "ALL");
        } else if (sheetName === "PAIRS") {
            renderMatrixPairs(json.table, targetId);
        } else if (sheetName === "BXH") {
            renderBXHTable(json.table, targetId);
        } else {
            renderStandardTable(json.table, targetId);
        }
    } catch (e) { console.error("Lỗi:", e); }
}

function renderBXHTable(table, targetId) {
    let html = `<table class="bxh-table"><thead><tr>`;
    table.cols.forEach(col => html += `<th>${col.label || ""}</th>`);
    html += `</tr></thead><tbody>`;
    table.rows.forEach((row, index) => { 
        if (!row.c || !row.c[1]) return; 
        const isTop1 = index === 0 ? "top-1" : "";
        html += `<tr class="${isTop1}">`; 
        row.c.forEach((cell, i) => {
            let val = cell?.f || cell?.v || "0";
            if (index === 0 && i === 0) val = "👑";
            html += `<td>${val}</td>`;
        });
        html += `</tr>`; 
    });
    document.getElementById(targetId).innerHTML = html + `</tbody></table>`;
}

function renderStandardTable(table, targetId) {
    let html = `<table class="standard-table"><thead><tr>`;
    table.cols.forEach(col => html += `<th>${col.label || ""}</th>`);
    html += `</tr></thead><tbody>`;
    table.rows.forEach(row => { 
        if (!row.c || !row.c.some(c => c && c.v !== null)) return; 
        html += `<tr>`; 
        row.c.forEach(cell => html += `<td>${cell?.f || cell?.v || ""}</td>`); 
        html += `</tr>`; 
    });
    document.getElementById(targetId).innerHTML = html + `</tbody></table>`;
}

function renderMatrixPairs(table, targetId) {
    let html = `<table class="standard-table">`;
    table.rows.forEach((row, rIdx) => {
        html += `<tr>`;
        row.c.forEach((cell, cIdx) => {
            let val = cell?.v || ""; let cls = "";
            if (rIdx === 0 || cIdx === 0) cls = "head-col";
            else if (rIdx === cIdx) cls = "cell-empty";
            else if (val.includes("Đủ 2 lượt")) cls = "cell-full";
            else if (val.includes("Chưa đấu")) cls = "cell-none";
            else if (val.includes("Thiếu lượt")) cls = "cell-missing";
            html += `<td class="${cls}">${val}</td>`;
        });
        html += `</tr>`;
    });
    document.getElementById(targetId).innerHTML = html + `</table>`;
}

function renderCards(rows, targetId, selectedTeam) {
    const container = document.getElementById(targetId);
    container.innerHTML = "";
    let html = "";
    rows.forEach((row, index) => {
        const d = `${row.c[0]?.v}/${row.c[1]?.v}/${row.c[2]?.v}`;
        const t1 = String(row.c[3]?.v || ""), t2 = String(row.c[6]?.v || "");
        const s1 = row.c[4]?.v ?? "-";
        const s2 = row.c[5]?.v ?? "-";
        let t1Cls = "", t2Cls = "";
        if (s1 !== "-" && s2 !== "-") {
            if (s1 > s2) { t1Cls = "txt-win"; t2Cls = "txt-lose"; }
            else if (s2 > s1) { t1Cls = "txt-lose"; t2Cls = "txt-win"; }
        }
        let badge = "", badgeCls = "";
        if (selectedTeam !== "ALL" && s1 !== "-" && s2 !== "-") {
            const isT1 = t1.includes(selectedTeam);
            if (s1 == s2) { badge = "HÒA"; badgeCls = "draw-badge"; }
            else if ((isT1 && s1 > s2) || (!isT1 && s2 > s1)) { badge = "THẮNG"; badgeCls = "win-badge"; }
            else { badge = "THUA"; badgeCls = "lose-badge"; }
        }
        const delay = (index * 0.05).toFixed(2);
        html += `<div class="match-card" style="border-top-color: ${badge === 'THẮNG' ? 'var(--win)' : badge === 'THUA' ? 'var(--lose)' : '#ddd'}; animation-delay: ${delay}s">
            <div class="match-date">${d}</div>
            <div class="match-main">
                <div class="team-box ${t1Cls}">${t1}</div>
                <div class="score-display"><div class="score-box">${s1}</div><div class="score-dash">-</div><div class="score-box">${s2}</div></div>
                <div class="team-box ${t2Cls}">${t2}</div>
            </div>
            ${badge ? `<div class="result-badge ${badgeCls}">${badge}</div>` : ''}
        </div>`;
    });
    container.innerHTML = html;
}

function filterMatches(team, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = team === 'ALL' ? allMatches : allMatches.filter(row => 
        String(row.c[3]?.v || "").includes(team) || String(row.c[6]?.v || "").includes(team)
    );
    renderCards(filtered, "CHECK_RESULT", team);
}

window.addEventListener('DOMContentLoaded', () => {
    loadSheet("BXH", "BXH"); loadSheet("MATCHES", "MATCHES");
    loadSheet("PAIRS", "PAIRS"); loadSheet("TEAMS", "TEAMS");
});
</script>
</body>
</html>
